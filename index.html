<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Salshabila Sayang</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-bg: #f3f7ff;
            --pink-main: #ff789d;
            --pink-dark: #e0527b;
            --text-color: #d04369;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            width: 100%;
            background-color: var(--pink-bg);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .main-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .section-page {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        /* --- HALAMAN 0: GERBANG PIN (MUNCUL PERTAMA) --- */
        #halaman-pin {
            display: flex;
            z-index: 25;
            gap: 15px;
        }

        #halaman-pin h2 {
            font-size: 1.5rem;
            color: var(--pink-dark);
            font-weight: 600;
            margin-bottom: 5px;
        }

        .input-pin-box {
            width: 200px;
            padding: 12px;
            border: 2px solid var(--pink-main);
            border-radius: 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--pink-dark);
            outline: none;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .error-pin-msg {
            color: #d14343;
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: 5px;
            display: none; /* muncul kalau salah */
        }

        /* --- HALAMAN 1: WELCOME --- */
        #halaman-welcome {
            z-index: 20;
            gap: 20px;
        }

        #halaman-welcome h1 {
            font-size: 2.2rem;
            color: var(--pink-dark);
            animation: pulse 2s infinite;
            font-weight: 600;
        }

        .btn-start, .btn-pilihan {
            background-color: var(--pink-main);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 120, 157, 0.4);
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-start:active, .btn-pilihan:active {
            transform: scale(0.95);
            background-color: var(--pink-dark);
        }

        #halaman-game {
            z-index: 30;
        }

        #counter-game {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            border: 2px solid var(--pink-main);
            z-index: 40;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .falling-love {
            position: absolute;
            cursor: pointer;
            user-select: none;
            animation: fall linear forwards;
            z-index: 35;
            transition: transform 0.1s;
        }
        
        .falling-love:active { transform: scale(1.3); }

        .particle {
            position: absolute;
            font-size: 14px;
            pointer-events: none;
            animation: burst 0.6s ease-out forwards;
            z-index: 36;
        }

        .modal-pilihan {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(243, 247, 255, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 50;
            padding: 20px;
        }

        .pilihan-content {
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 100%;
            border: 2px solid var(--pink-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .pilihan-content h3 {
            font-size: 1.3rem;
            color: var(--pink-dark);
            font-weight: 600;
        }

        .wrapper-tombol {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
            margin-top: 10px;
        }

        .btn-engga {
            background-color: #b0c4de;
            box-shadow: 0 5px 15px rgba(176, 196, 222, 0.4);
        }

        .bunny-container {
            font-size: 4.5rem;
            position: relative;
            height: 90px;
            display: none;
            animation: shake 0.5s infinite alternate;
        }
        .bunny-tears {
            position: absolute;
            font-size: 1.5rem;
            top: 40px;
            animation: tear-fall 0.8s infinite linear;
        }
        .tear-left { left: -5px; }
        .tear-right { right: -5px; }

        #halaman-loading {
            padding: 0 30px;
            z-index: 60;
        }

        #halaman-loading .loading-box {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        #halaman-loading h2 {
            font-weight: 400;
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: var(--pink-dark);
        }

        .loading-love-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .loading-heart-icon {
            font-size: 1.8rem;
            animation: beat 0.6s infinite alternate;
        }

        .progress-bar-container {
            flex-grow: 1;
            height: 26px;
            background-color: #fff;
            border: 3px solid var(--pink-main);
            border-radius: 15px;
            padding: 3px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--pink-main), var(--pink-dark));
            border-radius: 10px;
            transition: width 3s linear;
        }

        #halaman-utama {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 900px;
            height: auto;
            min-height: 450px;
            position: relative;
            display: none; 
            grid-template-columns: 1.2fr 1fr;
            gap: 40px;
            align-items: center;
            top: auto; left: auto;
            z-index: 70;
        }

        .decor-bow { position: absolute; font-size: 24px; opacity: 0.6; }
        .top-left { top: 15px; left: 15px; }
        .bottom-right { bottom: 15px; right: 15px; }

        .polaroid-frame {
            background: white;
            padding: 15px 15px 35px 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transform: rotate(-3deg);
            border-radius: 4px;
            text-align: center;
            position: relative;
            width: 100%;
        }
        
        .polaroid-frame .pin-bow {
            position: absolute;
            top: -15px;
            right: -10px;
            font-size: 28px;
            transform: rotate(15deg);
        }

        .polaroid-frame img {
            width: 100%;
            height: auto;
            max-height: 380px;
            object-fit: cover;
            display: block;
        }

        .polaroid-caption {
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            margin-top: 15px;
            color: var(--pink-dark);
        }

        .surat-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
        }

        .envelope-box {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }

        .envelope-box:active { transform: scale(0.98); }

        .pixel-envelope {
            width: 80px;
            height: 55px;
            border: 3px solid #b2685d;
            border-radius: 4px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }
        .env-red { background-color: #f6d1ad; }
        .env-blue { background-color: #aed9e5; border-color: #5587a2; display: none; }

        .pixel-heart {
            color: #d14343;
            font-size: 20px;
        }
        .env-blue .pixel-heart { color: #2e6283; }

        .envelope-text {
            font-weight: 600;
            font-size: 1.1rem;
            text-align: left;
        }
        .text-red { color: #c44768; }
        .text-blue { color: #437694; display: none; }

        #music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: white;
            border: 2px solid var(--pink-main);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.4rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 150;
            animation: pulse 2s infinite;
        }

        .modal-surat {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 160;
            padding: 20px;
        }

        .modal-content {
            background: #fffdf9;
            padding: 30px;
            border-radius: 20px;
            max-width: 450px;
            width: 100%;
            border: 2px dashed var(--pink-main);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content p {
            font-family: 'Caveat', cursive;
            font-size: 1.6rem;
            line-height: 1.6;
            color: #444;
            white-space: pre-line;
            text-align: left;
        }

        .btn-close-modal {
            margin-top: 20px;
            background: var(--pink-main);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            float: right;
        }

        @keyframes fall {
            0% { top: -10%; transform: translateX(0) rotate(0deg); }
            100% { top: 105%; transform: translateX(30px) rotate(360deg); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes beat {
            to { transform: scale(1.25); }
        }
        @keyframes burst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
        @keyframes shake {
            0% { transform: rotate(-5deg); }
            100% { transform: rotate(5deg); }
        }
        @keyframes tear-fall {
            0% { top: 40px; opacity: 1; }
            100% { top: 80px; opacity: 0; }
        }

        @media (max-width: 768px) {
            body { overflow-y: auto; }
            .main-container { height: auto; min-height: 100vh; padding: 20px 0; }
            .section-page { position: relative; height: auto; min-height: 100vh; }
            #halaman-utama { grid-template-columns: 1fr; width: 95%; gap: 25px; padding: 20px; }
            #halaman-game { position: fixed; height: 100vh; }
        }
    </style>
</head>
<body onclick="bukaWebMuterLagu()">

    <audio id="bg-music" src="lagu_kita.mp3" loop></audio>
    <div id="music-control" onclick="toggleMusic(event)">🎵</div>

    <div class="main-container">
        <div id="halaman-pin" class="section-page">
            <h2>masukkan kode rahasia ❤️</h2>
            <input type="number" id="inputPinField" class="input-pin-box" placeholder="••••••••" oninput="cekPinOtomatis(this)">
            <div id="pin-error-text" class="error-pin-msg">coba tanggal jadian kita 🥺</div>
        </div>

        <div id="halaman-welcome" class="section-page">
            <h1>hi salshabila sayang ❤️</h1>
            <button class="btn-start" onclick="mulaiGame(event)">start with love</button>
        </div>

        <div id="halaman-game" class="section-page">
            <div id="counter-game">mengumpulkan hati: <span id="score-text">0</span>/15</div>
        </div>

        <div id="halaman-loading" class="section-page">
            <div class="loading-box">
                <h2>kafi bawa kehalaman selanjutnya...</h2>
                <div class="loading-love-wrapper">
                    <div class="loading-heart-icon">❤️</div>
                    <div class="progress-bar-container">
                        <div id="loading-bar" class="progress-bar-fill"></div>
                    </div>
                    <div class="loading-heart-icon">❤️</div>
                </div>
            </div>
        </div>
                <div id="halaman-utama">
            <div class="decor-bow top-left">🎀</div>
            <div class="decor-bow bottom-right">🎀</div>

            <div class="polaroid-frame">
                <div class="pin-bow">🎀</div>
                <img src="sasha.jpg" alt="Foto Bersama Salshabila" onerror="this.src='https://picsum.photos/400/500'">
                <div class="polaroid-caption">my love, my future wife &lt;3</div>
            </div>

            <div class="surat-container">
                <div class="envelope-box" id="tombol-surat1" onclick="bukaSurat(1)">
                    <div class="pixel-envelope env-red">
                        <span class="pixel-heart">♥</span>
                    </div>
                    <div class="envelope-text text-red">Surat Untukmu</div>
                </div>

                <div class="envelope-box" id="tombol-surat2" onclick="bukaSurat(2)" style="display: none;">
                    <div class="pixel-envelope env-blue" id="env-blue-render">
                        <span class="pixel-heart">♥</span>
                    </div>
                    <div class="envelope-text text-blue" id="text-blue-render">Satu Lagi...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-pilihan" id="modalPilihan">
        <div class="pilihan-content">
            <div id="bunny-sad" class="bunny-container">
                🐰
                <div class="bunny-tears tear-left">💧</div>
                <div class="bunny-tears tear-right">💧</div>
            </div>
            <h3 id="teks-pilihan">lanjut kehalaman selanjutnya?</h3>
            <div class="wrapper-tombol">
                <button class="btn-pilihan" onclick="pilihMau(event)">mau</button>
                <button class="btn-pilihan btn-engga" id="tombol-engga" onclick="pilihEngga(event)">engga</button>
            </div>
        </div>
    </div>

    <div class="modal-surat" id="modalSurat">
        <div class="modal-content">
            <p id="isiSuratTeks"></p>
            <button class="btn-close-modal" onclick="tutupSurat()">Tutup</button>
        </div>
    </div>

    <script>
        const isiSurat1 = `sayang salshabilaikuuu, i know you love me more than anything, you do you love me, and you know i love you the most. 

maaf akhir akhir ini kafi jadi terlalu bergantung sama kamu, kamu mungkin risih hate sama aku, aku merasa bersalah karena kafi seenaknya, besar kepala dan banyak sekali gerakan nya hehe, kafi haus perhatian kamu, kafi mau kamu liat semua tentang kafi.

dan kurasa itu semua kurang benar dan annoying teruntuk kamu, even you bilang tidak pun pasti didalam hati iya itu sangat menjengkelkan HAHAHA. kafi minta maaf ya sayang kafi banyak tingkahnya, kafi merasa kafi dianggap seperti anak kecil bagimu hehe thats what make me like this.

kafi mau jadi diri kafi sendiri, jika kamu suruh kafi buat berhenti karena kamu terganggu tentang hal itu, aku akan berhenti. i love you mosttt sayang ❤️`;

        const isiSurat2 = `sayanggg kafi ga larang kamu buat kamu punya waktu sendiri atau apa, setidaknya billing dulu ke kafi mau apa yaaa, kafi tidak akan larang kamu. 

kafi khawatir kannn kalo kamu kenapa kenapa dan kafi tidak tau, aku gamau lagi seperti itu sayang hehe 🥰`;

        let skorHati = 0;
        let gameInterval;
        let suratTerbukaSekarang = 1;
        let laguSudahMuter = false;
        const music = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-control');

        function bukaWebMuterLagu() {
            if (!laguSudahMuter) {
                music.play().then(() => {
                    laguSudahMuter = true;
                }).catch(err => console.log("Menunggu interaksi awal"));
            }
        }

        // FITUR BARU: Fungsi validasi pin 8 digit otomatis pas diketik di HP
        function cekPinOtomatis(input) {
            const pinBenar = "18042025";
            const errorText = document.getElementById('pin-error-text');
            
            // Cek kalau digitnya udah lengkap 8 angka baru divalidasi
            if (input.value.length === 8) {
                if (input.value === pinBenar) {
                    errorText.style.display = 'none';
                    // Sembunyikan halaman gerbang pin, tampilkan welcome page
                    document.getElementById('halaman-pin').style.display = 'none';
                    document.getElementById('halaman-welcome').style.display = 'flex';
                    
                    // Putar musik otomatis begitu pin berhasil dijebol
                    music.play().then(() => { laguSudahMuter = true; }).catch(e => console.log(e));
                } else {
                    errorText.style.display = 'block'; // Muncul peringatan sedih jadian
                    input.value = ""; // Bersihkan kolom biar ketik ulang
                }
            }
        }

        function mulaiGame(e) {
            e.stopPropagation();
            music.play().catch(err => console.log("Music blocked: ", err));
            document.getElementById('halaman-welcome').style.display = 'none';
            document.getElementById('halaman-game').style.display = 'flex'; 
            gameInterval = setInterval(buatHatiJatuh, 600);
        }

        function buatHatiJatuh() {
            if (skorHati >= 15) return;
            const love = document.createElement('div');
            love.classList.add('falling-love');
            love.innerHTML = '❤️';
            const ukuranAcak = Math.floor(Math.random() * 30) + 25;
            love.style.fontSize = ukuranAcak + 'px';
            const randomX = Math.random() * (window.innerWidth - 60);
            love.style.left = randomX + 'px';
            const durasiJatuh = Math.random() * 1.5 + 1.5; 
            love.style.animationDuration = durasiJatuh + 's';

            love.onclick = function(e) {
                e.stopPropagation();
                skorHati++;
                document.getElementById('score-text').innerText = skorHati;
                buatEfekLedakan(e.clientX, e.clientY);
                love.remove();
                if (skorHati >= 15) {
                    clearInterval(gameInterval);
                    munculkanPilihan();
                }
            };
            document.getElementById('halaman-game').appendChild(love);
            setTimeout(() => { love.remove(); }, durasiJatuh * 1000);
        }

        function buatEfekLedakan(x, y) {
            const jumlahPartikel = 6;
            for (let i = 0; i < jumlahPartikel; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.innerHTML = Math.random() > 0.5 ? '🌸' : '❤️';
                p.style.left = x + 'px'; p.style.top = y + 'px';
                const arahX = (Math.random() - 0.5) * 150;
                const arahY = (Math.random() - 0.5) * 150;
                p.style.setProperty('--x', arahX + 'px');
                p.style.setProperty('--y', arahY + 'px');
                document.body.appendChild(p);
                setTimeout(() => { p.remove(); }, 600);
            }
        }

        function munculkanPilihan() {
            document.getElementById('halaman-game').style.display = 'none';
            document.getElementById('modalPilihan').style.display = 'flex';
        }

        function pilihEngga(e) {
            e.stopPropagation();
            document.getElementById('bunny-sad').style.display = 'block';
            document.getElementById('teks-pilihan').innerHTML = 'kamu ga sayang aku yaa? 🥺🥹';
            document.getElementById('tombol-engga').style.display = 'none';
        }

        function pilihMau(e) {
            e.stopPropagation();
            document.getElementById('modalPilihan').style.display = 'none';
            pindahKeLoading();
        }

        function pindahKeLoading() {
            document.getElementById('halaman-loading').style.display = 'flex'; 
            setTimeout(() => {
                document.getElementById('loading-bar').style.width = '100%';
            }, 50);
            setTimeout(() => {
                document.getElementById('halaman-loading').style.display = 'none';
                const halUtama = document.getElementById('halaman-utama');
                halUtama.style.display = window.innerWidth <= 768 ? 'flex' : 'grid';
            }, 3100);
        }

        function toggleMusic(e) {
            e.stopPropagation();
            if (music.paused) {
                music.play();
                musicBtn.innerText = '🎵';
                musicBtn.style.animation = 'pulse 2s infinite';
            } else {
                music.pause();
                musicBtn.innerText = '🔇';
                musicBtn.style.animation = 'none';
            }
        }

        function bukaSurat(nomor) {
            suratTerbukaSekarang = nomor;
            const modal = document.getElementById('modalSurat');
            const teksPesan = document.getElementById('isiSuratTeks');
            if (nomor === 1) teksPesan.innerText = isiSurat1;
            else if (nomor === 2) teksPesan.innerText = isiSurat2;
            modal.style.display = 'flex';
        }

        function tutupSurat() {
            document.getElementById('modalSurat').style.display = 'none';
            if (suratTerbukaSekarang === 1) {
                document.getElementById('tombol-surat2').style.display = 'flex';
                document.getElementById('env-blue-render').style.display = 'flex';
                document.getElementById('text-blue-render').style.display = 'block';
            }
        }
    </script>
</body>
</html>
