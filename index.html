<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Salshabila Sayang</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-bg: #f3f7ff;
            --pink-main: #ff789d;
            --pink-dark: #e0527b;
            --text-color: #d04369;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--pink-bg);
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- HALAMAN 1: WELCOME (FIXED DI TENGAH) --- */
        #halaman-welcome {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 10;
            padding: 20px;
            text-align: center;
        }

        #halaman-welcome h1 {
            font-size: 2.2rem;
            color: var(--pink-dark);
            animation: pulse 2s infinite;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .btn-start, .btn-pilihan {
            background-color: var(--pink-main);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 120, 157, 0.4);
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-start:active, .btn-pilihan:active {
            transform: scale(0.95);
            background-color: var(--pink-dark);
        }

        /* --- HALAMAN 2: MINIGAME --- */
        #halaman-game {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        #counter-game {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            border: 2px solid var(--pink-main);
            z-index: 20;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .falling-love {
            position: absolute;
            cursor: pointer;
            user-select: none;
            animation: fall linear forwards;
            z-index: 15;
            transition: transform 0.1s;
        }
        
        .falling-love:active { transform: scale(1.3); }

        .particle {
            position: absolute;
            font-size: 14px;
            pointer-events: none;
            animation: burst 0.6s ease-out forwards;
            z-index: 16;
        }

        /* --- DIALOG POPUP PILIHAN (PAS SELESAI GAME) --- */
        .modal-pilihan {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(243, 247, 255, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 50;
            padding: 20px;
        }

        .pilihan-content {
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 100%;
            border: 2px solid var(--pink-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .pilihan-content h3 {
            font-size: 1.3rem;
            color: var(--pink-dark);
            font-weight: 600;
        }

        .wrapper-tombol {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
            margin-top: 10px;
        }

        .btn-engga {
            background-color: #b0c4de;
            box-shadow: 0 5px 15px rgba(176, 196, 222, 0.4);
        }

        /* Kelinci Nangis via CSS Art & Emoji Bergerak */
        .bunny-container {
            font-size: 4.5rem;
            position: relative;
            height: 90px;
            display: none; /* Muncul pas klik engga */
            animation: shake 0.5s infinite alternate;
        }
        .bunny-tears {
            position: absolute;
            font-size: 1.5rem;
            top: 40px;
            animation: tear-fall 0.8s infinite linear;
        }
        .tear-left { left: -5px; }
        .tear-right { right: -5px; }

        /* --- HALAMAN 3: LOADING THEME LOVE --- */
        #halaman-loading {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            width: 85%;
            max-width: 400px;
        }

        #halaman-loading h2 {
            font-weight: 400;
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: var(--pink-dark);
            text-align: center;
        }

        .loading-love-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .loading-heart-icon {
            font-size: 1.8rem;
            animation: beat 0.6s infinite alternate;
        }

        .progress-bar-container {
            flex-grow: 1;
            height: 26px;
            background-color: #fff;
            border: 3px solid var(--pink-main);
            border-radius: 15px;
            padding: 3px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--pink-main), var(--pink-dark));
            border-radius: 10px;
            transition: width 3s linear;
        }

        /* --- HALAMAN 4: UTAMA (Sesuai Screenshot) --- */
        #halaman-utama {
            display: none;
            width: 90%;
            max-width: 900px;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
            grid-template-columns: 1.2fr 1fr;
            gap: 40px;
            align-items: center;
        }

        .decor-bow { position: absolute; font-size: 24px; opacity: 0.6; }
        .top-left { top: 15px; left: 15px; }
        .bottom-right { bottom: 15px; right: 15px; }

        /* Frame Polaroid */
        .polaroid-frame {
            background: white;
            padding: 15px 15px 35px 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transform: rotate(-3deg);
            border-radius: 4px;
            text-align: center;
            position: relative;
        }
        
        .polaroid-frame .pin-bow {
            position: absolute;
            top: -15px;
            right: -10px;
            font-size: 28px;
            transform: rotate(15deg);
        }

        .polaroid-frame img {
            width: 100%;
            height: auto;
            max-height: 380px;
            object-fit: cover;
            display: block;
        }

        .polaroid-caption {
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            margin-top: 15px;
            color: var(--pink-dark);
        }

        /* Bagian Surat di Kanan */
        .surat-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .envelope-box {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .envelope-box:active { transform: scale(0.98); }

        .pixel-envelope {
            width: 80px;
            height: 55px;
            border: 3px solid #b2685d;
            border-radius: 4px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .env-red { background-color: #f6d1ad; }
        .env-blue { background-color: #aed9e5; border-color: #5587a2; display: none; }

        .pixel-heart {
            color: #d14343;
            font-size: 20px;
        }
        .env-blue .pixel-heart { color: #2e6283; }

        .envelope-text {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .text-red { color: #c44768; }
        .text-blue { color: #437694; display: none; }

        /* TOMBOL MUSIK */
        #music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: white;
            border: 2px solid var(--pink-main);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.4rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 110;
            animation: pulse 2s infinite;
        }

        /* Popup Surat Dialog */
        .modal-surat {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .modal-content {
            background: #fffdf9;
            padding: 30px;
            border-radius: 20px;
            max-width: 450px;
            width: 100%;
            border: 2px dashed var(--pink-main);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content p {
            font-family: 'Caveat', cursive;
            font-size: 1.6rem;
            line-height: 1.6;
            color: #444;
            white-space: pre-line;
            text-align: left;
        }

        .btn-close-modal {
            margin-top: 20px;
            background: var(--pink-main);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            float: right;
        }

        /* --- ANIMASI --- */
        @keyframes fall {
            0% { top: -10%; transform: translateX(0) rotate(0deg); }
            100% { top: 105%; transform: translateX(30px) rotate(360deg); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes beat {
            to { transform: scale(1.25); }
        }
        @keyframes burst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
        @keyframes shake {
            0% { transform: rotate(-5deg); }
            100% { transform: rotate(5deg); }
        }
        @keyframes tear-fall {
            0% { top: 40px; opacity: 1; }
            100% { top: 80px; opacity: 0; }
        }

        /* Responsive HP */
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; padding: 20px 0; }
            #halaman-utama { grid-template-columns: 1fr; width: 95%; gap: 25px; padding: 20px;}
            #halaman-game { position: fixed; }
        }
    </style>
</head>

        function bukaWebMuterLagu() {

                music.play().then(() => {

        }

        function mulaiGame(e) {

            bukaWebMuterLagu();

            document.getElementById('halaman-game').style.display = 'block';
            gameInterval = setInterval(buatHatiJatuh, 600);
        }

        function buatHatiJatuh() {
            if (skorHati >= 15) return;

            const love = document.createElement('div');
            love.classList.add('falling-love');
            love.innerHTML = '❤️';
            
            const ukuranAcak = Math.floor(Math.random() * 30) + 25;
            love.style.fontSize = ukuranAcak + 'px';

            love.style.left = randomX + 'px';
            const durasiJatuh = Math.random() * 1.5 + 1.5; 
            love.style.animationDuration = durasiJatuh + 's';

            love.onclick = function(e) {
                e.stopPropagation();
                skorHati++;
                document.getElementById('score-text').innerText = skorHati;
                buatEfekLedakan(e.clientX, e.clientY);
                love.remove();

                if (skorHati >= 15) {
                    clearInterval(gameInterval);
                    munculkanPilihan();
                }
            };

            document.getElementById('halaman-game').appendChild(love);
            setTimeout(() => { love.remove(); }, durasiJatuh * 1000);
        }

        function buatEfekLedakan(x, y) {
            const jumlahPartikel = 6;
            for (let i = 0; i < jumlahPartikel; i++) {

                p.classList.add('particle');
                p.innerHTML = Math.random() > 0.5 ? '🌸' : '❤️';

                const arahX = (Math.random() - 0.5) * 150;

                p.style.setProperty('--properties--y', arahY + 'px');

                document.body.appendChild(p);
                setTimeout(() => { p.remove(); }, 600);
            }
        }

            document.getElementById('modalPilihan').style.display = 'flex';

        }

        function pilihMau(e) {

            document.getElementById('modalPilihan').style.display = 'none';
            pindahKeLoading();
        }

        function pindahKeLoading() {

                document.getElementById('loading-bar').style.width = '100%';
            }, 50);

            }, 3100);
        }
